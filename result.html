<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ケンカン君 - 測定結果</title>
  <link rel="stylesheet" href="style2.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* 見た目の調整 */
    #karada { font-family: system-ui, -apple-system, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif; margin: 20px; }
    #chartWrap { width: 640px; height: 480px; margin: 0 auto; border: 1px solid black; padding: 12px; box-sizing: border-box; }
    #foodChart { width: 100%; height: 100%; display: block; }
    #info { text-align:center; margin-top: 12px; font-weight: bold; }
    .small { font-size: 0.9em; color:black; }
  </style>
</head>
<body>
  <div class="cute">
  <h1 class="title">測定結果</h1>
  <div id="result"></div>
  <div style="margin-top:1rem;">

  </div>
</div>
  <script>
  function getQueryParam(name) {
    const url = new URL(location.href);
    return url.searchParams.get(name);
  }

  function renderResult(payload) {
    const container = document.getElementById('result');
    if (!payload) {
      container.innerHTML = '<p>データが見つかりません。</p>';
      return;
    }

    try {
      const obj = JSON.parse(payload);
      const { data, height, weight, goal } = obj;

      let html = '<div style="padding:1rem; max-width:800px;">';
      html += '<h2>基本情報</h2>';
      html += `<p>身長: ${height || '未入力'} cm<br>体重: ${weight || '未入力'} kg<br>目標: ${goal || '未選択'}</p>`;

      html += '<h2>選択した食品</h2>';
      html += '<div>';
      for (const key in data) {
        const items = data[key];
        html += `<h3>${key}</h3>`;
        if (items.length) {
          html += '<ul>';
          items.forEach(it => html += `<li>${it}</li>`);
          html += '</ul>';
        } else {
          html += '<p style="color:#666;">（未選択）</p>';
        }
      }
      html += '</div>';

      // 簡易「測定結果」の例（BMI を計算）
      html += '<h2>簡易判定</h2>';
      const hNum = parseFloat(height);
      const wNum = parseFloat(weight);
      if (!isNaN(hNum) && !isNaN(wNum) && hNum > 0) {
        const bmi = (wNum / ((hNum/100) ** 2)).toFixed(1);
        html += `<p>BMI: <strong>${bmi}</strong></p>`;
        if (bmi < 18.5) html += '<p>判定: 低体重（痩せ）</p>';
        else if (bmi < 25) html += '<p>判定: 普通体重</p>';
        else html += '<p>判定: 肥満</p>';
      } else {
        html += '<p>身長・体重の正しい数値を入力すると簡易判定が表示されます。</p>';
      }

      html += '</div>';
      container.innerHTML = html;
    } catch (e) {
      container.innerHTML = '<p>データの読み込みに失敗しました。</p>';
      console.error(e);
    }
  }

  // 実行
  const payloadParam = getQueryParam('payload');
  const payload = payloadParam ? decodeURIComponent(payloadParam) : null;
  renderResult(payload);
  </script>
   </div>
  <div class="b">
    <a href="index.html" class="boton">戻る</a>
  </div>

<div id="karada">
  <h2 style="text-align:center;">食事レーダーチャート（目標と実績の合致率）</h2>
  <div id="chartWrap">
    <canvas id="foodChart"></canvas>
    <div id="info" class="small">読み込み中...</div>
 
    <!-- コメント表示エリア（追加） -->
  <div id="commentWrap" style="width:640px; margin:12px auto; padding:12px; border:1px solid #eee; background:#fafafa;">
    <h3 style="margin:0 0 8px 0; font-size:1.1em;">一口コメント</h3>
    <div id="aiComment" style="min-height:60px; white-space:pre-wrap; color:#222;"></div>
    <div style="text-align:right; margin-top:8px;">
      <button id="regenerateComment">コメントを再生成</button>
    </div>
  </div>
   
      <table id="resultTable" border="1" style="width:100%; margin-top:12px; border-collapse:collapse;">
      <thead>
        <tr><th style="padding:6px;">項目</th><th style="padding:6px;">値</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <!-- 実行コード（Chart.js の後に読み込む） -->
  <script src="script2.js"></script>
</div>
 
</body>
</html>
